<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mapa Inmobiliarias · GarantíaYa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --accent: #5b6af7;
    --accent2: #7c8bf9;
    --gold: #e8c97e;
    --text: #f0f0f5;
    --text-muted: #8888a0;
    --success: #4ecb8a;
    --danger: #f06565;
    --panel-w: 380px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── LOADING OVERLAY ── */
  #loadingOverlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 24px;
    transition: opacity .5s ease, visibility .5s;
  }
  #loadingOverlay.hidden { opacity: 0; visibility: hidden; }
  .loader-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .loader-logo img {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    object-fit: contain;
    background: white;
    padding: 4px;
    animation: logoFloat 2s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .loader-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -.02em;
  }
  .loader-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: -8px;
    letter-spacing: .04em;
  }
  .loader-dots {
    display: flex;
    gap: 7px;
    align-items: center;
  }
  .loader-dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: dotBounce 1.3s ease-in-out infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: .18s; background: var(--accent2); }
  .loader-dot:nth-child(3) { animation-delay: .36s; background: var(--gold); }
  @keyframes dotBounce {
    0%,80%,100% { transform: scale(.55); opacity: .35; }
    40% { transform: scale(1); opacity: 1; }
  }
  .loader-msg {
    font-size: 12px;
    color: var(--text-muted);
    min-height: 18px;
    transition: opacity .3s;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 9px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .logo-img {
    width: 30px; height: 30px;
    border-radius: 7px;
    object-fit: contain;
    background: white;
    padding: 2px;
  }

  /* Global search */
  .global-search {
    flex: 1;
    max-width: 340px;
    position: relative;
  }
  .gs-wrap {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 0 14px 0 12px;
    gap: 8px;
    transition: border-color .2s, box-shadow .2s;
  }
  .gs-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,106,247,.12);
  }
  .gs-icon { color: var(--text-muted); font-size: 14px; flex-shrink: 0; }
  .gs-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 0;
  }
  .gs-input::placeholder { color: var(--text-muted); }
  .gs-clear {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 14px; padding: 2px;
    display: none;
    transition: color .15s;
  }
  .gs-clear:hover { color: var(--text); }
  .gs-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    z-index: 200;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    scrollbar-width: thin;
    scrollbar-color: var(--surface) transparent;
  }
  .gs-dropdown.open { display: block; animation: dropIn .15s ease; }
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .gs-result {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background .1s;
    border-bottom: 1px solid var(--border);
  }
  .gs-result:last-child { border-bottom: none; }
  .gs-result:hover { background: rgba(91,106,247,.1); }
  .gs-result-icon { font-size: 14px; flex-shrink: 0; opacity: .7; }
  .gs-result-info { min-width: 0; }
  .gs-result-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gs-result-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .gs-result-tag {
    margin-left: auto;
    flex-shrink: 0;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .gs-empty { padding: 20px; text-align: center; font-size: 12px; color: var(--text-muted); }

  .header-stats {
    display: flex;
    gap: 18px;
    align-items: center;
    margin-left: auto;
    flex-shrink: 0;
  }
  .stat { display: flex; flex-direction: column; align-items: flex-end; }
  .stat-val { font-size: 15px; font-weight: 600; color: var(--accent2); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .select-wrap { position: relative; flex: 1; max-width: 240px; }
  .select-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .select-wrap::after {
    content: '▾'; position: absolute; right: 12px; bottom: 10px;
    color: var(--text-muted); pointer-events: none; font-size: 11px;
  }
  select {
    width: 100%; padding: 9px 32px 9px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    appearance: none; cursor: pointer;
    transition: border-color .15s; outline: none;
  }
  select:hover { border-color: rgba(255,255,255,0.15); }
  select:focus { border-color: var(--accent); }
  select:disabled { opacity: .4; cursor: default; }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    height: 36px;
  }
  .mode-btn {
    padding: 0 13px;
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .mode-btn:last-child { border-right: none; }
  .mode-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .mode-btn.active { background: var(--accent); color: white; }
  .mode-btn:disabled { opacity: .35; cursor: default; }

  .btn-clear {
    padding: 9px 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; cursor: pointer; transition: all .15s;
    white-space: nowrap; height: 36px;
    display: flex; align-items: center;
  }
  .btn-clear:hover { border-color: var(--accent); color: var(--accent2); }

  .loading-bar { height: 2px; background: var(--surface); flex-shrink: 0; overflow: hidden; position: relative; }
  .loading-bar.active::after {
    content: ''; position: absolute; left: -40%; top: 0; bottom: 0; width: 40%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: loadbar 1s ease-in-out infinite;
  }
  @keyframes loadbar { to { left: 100%; } }

  /* ── LAYOUT ── */
  .layout { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; height: 100%; }

  /* Maps overrides */
  .gm-style .gm-style-iw-c {
    background: var(--surface2) !important; border: 1px solid var(--border) !important;
    border-radius: 10px !important; padding: 0 !important; box-shadow: 0 8px 32px rgba(0,0,0,.5) !important;
  }
  .gm-style .gm-style-iw-d { overflow: hidden !important; }
  .gm-style .gm-style-iw-tc::after { background: var(--surface2) !important; }
  .gm-style button.gm-ui-hover-effect span { background-color: var(--text-muted) !important; }
  .info-popup { padding: 14px 16px; min-width: 200px; max-width: 260px; }
  .info-popup h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .info-popup .info-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .info-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; background: rgba(91,106,247,.15);
    border: 1px solid rgba(91,106,247,.3); border-radius: 20px;
    font-size: 11px; color: var(--accent2); margin-bottom: 6px;
  }

  /* ── PANEL ── */
  .panel {
    width: var(--panel-w); background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .panel-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-title { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--text); line-height: 1.2; }
  .panel-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .panel-body {
    flex: 1; overflow-y: auto; padding: 14px;
    scrollbar-width: thin; scrollbar-color: var(--surface2) transparent;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .panel-search { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; }
  .panel-search input {
    width: 100%; padding: 8px 12px 8px 32px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    outline: none; transition: border-color .15s;
  }
  .panel-search input:focus { border-color: var(--accent); }
  .panel-search input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }

  /* ── WELCOME PANEL ── */
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; background: rgba(78,203,138,.1);
    border: 1px solid rgba(78,203,138,.2); border-radius: 20px;
    font-size: 11px; color: var(--success); font-weight: 500; margin-bottom: 14px;
  }
  .live-dot {
    width: 6px; height: 6px; background: var(--success); border-radius: 50%;
    animation: livePulse 1.5s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(78,203,138,.4); }
    50% { opacity:.7; box-shadow: 0 0 0 4px rgba(78,203,138,0); }
  }
  .welcome-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
  .ws-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 8px; text-align: center; transition: border-color .2s, transform .15s;
    cursor: default;
  }
  .ws-card:hover { border-color: rgba(91,106,247,.4); transform: translateY(-2px); }
  .ws-val { font-size: 22px; font-weight: 700; color: var(--accent2); line-height: 1; font-variant-numeric: tabular-nums; }
  .ws-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }

  .section-title {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .chip {
    padding: 6px 13px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 20px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500; cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .chip:hover { background: rgba(91,106,247,.15); border-color: rgba(91,106,247,.4); color: var(--accent2); transform: translateY(-1px); }
  .chip.featured { background: rgba(91,106,247,.12); border-color: rgba(91,106,247,.35); color: var(--accent2); }

  .top-zonas-list { margin-bottom: 18px; }
  .top-zona-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px; margin: 0 -8px;
    cursor: pointer; border-radius: 7px; transition: background .15s;
  }
  .top-zona-item:hover { background: var(--surface2); }
  .tz-rank { font-size: 10px; color: var(--text-muted); width: 14px; text-align: center; flex-shrink: 0; }
  .tz-name { font-size: 12px; color: var(--text); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tz-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
  .tz-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; width: 0; transition: width 1s cubic-bezier(.16,1,.3,1); }
  .tz-count { font-size: 11px; color: var(--accent2); font-weight: 600; width: 28px; text-align: right; flex-shrink: 0; }

  .activity-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .activity-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; background: var(--surface2); border-radius: 7px;
    transition: background .15s;
  }
  .activity-item:hover { background: rgba(91,106,247,.08); }
  .ai-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ai-name { font-size: 12px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
  .ai-city { font-size: 11px; color: var(--text-muted); }
  .ai-days { font-size: 10px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; margin-left: 8px; }
  .ai-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .ai-dot.recent { background: var(--success); }
  .ai-dot.mid    { background: var(--gold); }
  .ai-dot.old    { background: var(--danger); }

  /* ── INMO CARDS ── */
  .inmo-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 8px;
    cursor: pointer; transition: all .15s; position: relative; overflow: hidden;
  }
  .inmo-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent); opacity: 0; transition: opacity .15s;
  }
  .inmo-card:hover { border-color: rgba(255,255,255,0.13); transform: translateY(-1px); }
  .inmo-card:hover::before { opacity: 1; }
  .inmo-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 5px; }
  .inmo-row { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .inmo-row .val { color: var(--text); }
  .inmo-tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; }
  .inmo-tag.recent { background: rgba(78,203,138,.12); color: var(--success); }
  .inmo-tag.old    { background: rgba(240,101,101,.10); color: var(--danger); }
  .inmo-tag.mid    { background: rgba(232,201,126,.10); color: var(--gold); }
  .inmo-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .inmo-footer a { font-size: 11px; color: var(--accent2); text-decoration: none; font-weight: 500; }
  .inmo-footer a:hover { text-decoration: underline; }
  .inmo-footer .date-badge { font-size: 10px; color: var(--text-muted); }

  .zona-summary {
    background: linear-gradient(135deg, rgba(91,106,247,.1), rgba(91,106,247,.04));
    border: 1px solid rgba(91,106,247,.2); border-radius: 10px; padding: 14px; margin-bottom: 12px;
  }
  .zona-name { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--text); margin-bottom: 10px; }
  .zona-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .zona-stat { background: rgba(255,255,255,.04); border-radius: 7px; padding: 8px 10px; }
  .zona-stat-val { font-size: 18px; font-weight: 600; color: var(--accent2); line-height: 1; }
  .zona-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px 20px; gap: 12px; }
  .empty-icon { font-size: 36px; opacity: .3; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text); }
  .empty-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* Animate in */
  .fade-in { animation: fadeUp .25s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* Geocoding progress */
  .geo-progress {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: rgba(91,106,247,.08);
    border: 1px solid rgba(91,106,247,.15);
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .geo-progress-bar-wrap { flex: 1; height: 3px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
  .geo-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

  @media (max-width: 768px) {
    :root { --panel-w: 100vw; }
    .layout { flex-direction: column; }
    #map { flex: none; height: 50vh; }
    .panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    .header-stats { display: none; }
    .global-search { max-width: 200px; }
  }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="loader-logo">
    <img src="https://firebasestorage.googleapis.com/v0/b/storage-files-b4831.appspot.com/o/isologo_color_positivo%20(1).jpg?alt=media&token=ab83edb4-0bc0-42cb-b320-a236cc6d2952" alt="GarantíaYa">
    <div class="loader-brand">GarantíaYa</div>
    <div class="loader-sub">Mapa Comercial</div>
  </div>
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
  <div class="loader-msg" id="loaderMsg">Conectando con los datos...</div>
</div>

<header>
  <div class="logo">
    <img class="logo-img" src="https://firebasestorage.googleapis.com/v0/b/storage-files-b4831.appspot.com/o/isologo_color_positivo%20(1).jpg?alt=media&token=ab83edb4-0bc0-42cb-b320-a236cc6d2952" alt="GarantíaYa">
    GarantíaYa <span style="color:var(--text-muted);font-size:12px;font-weight:300;margin-left:2px">/ Mapa</span>
  </div>

  <!-- GLOBAL SEARCH -->
  <div class="global-search" id="globalSearch">
    <div class="gs-wrap">
      <span class="gs-icon">⌕</span>
      <input class="gs-input" id="gsInput" type="text" placeholder="Buscar inmobiliaria...">
      <button class="gs-clear" id="gsClear" onclick="clearGlobalSearch()">✕</button>
    </div>
    <div class="gs-dropdown" id="gsDropdown"></div>
  </div>

  <div class="header-stats">
    <div class="stat">
      <div class="stat-val" id="total-inmos">—</div>
      <div class="stat-label">Inmobiliarias</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="total-zonas">—</div>
      <div class="stat-label">Partidos</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="select-wrap">
    <div class="select-label">Partido</div>
    <select id="selProvincia"><option value="">Todos los partidos</option></select>
  </div>
  <div class="select-wrap">
    <div class="select-label">Localidad</div>
    <select id="selBarrio" disabled><option value="">Seleccioná una localidad</option></select>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
    <div class="select-label">Vista</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnMarkers" onclick="setMode('markers')">📍 Marcadores</button>
      <button class="mode-btn" id="btnHeat" onclick="setMode('heat')" disabled>🔥 Calor</button>
      <button class="mode-btn" id="btnTemp" onclick="setMode('temp')" disabled>🌡️ Temperatura</button>
    </div>
  </div>
  <button class="btn-clear" id="btnClear">✕</button>
</div>

<div class="loading-bar" id="loadingBar"></div>

<div class="layout">
  <div id="map"></div>
  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">—</div>
      <div class="panel-subtitle" id="panelSubtitle">—</div>
    </div>
    <div class="panel-search" id="panelSearch" style="display:none">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Buscar en esta zona...">
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<script>
const N8N_ENDPOINT = '/api/datos';
const LOGO = 'https://firebasestorage.googleapis.com/v0/b/storage-files-b4831.appspot.com/o/isologo_color_positivo%20(1).jpg?alt=media&token=ab83edb4-0bc0-42cb-b320-a236cc6d2952';

// ── STATE ──
let map, heatmapLayer, markers = [], infoWindow;
let raw = null;
let locByProvincia = new Map();
let inmosByBarrio  = new Map();
let currentInmos   = [];
let currentMode    = 'markers';
let geoTotal = 0, geoDone = 0;
const geoCache = {};

// Load geocache from localStorage
try { Object.assign(geoCache, JSON.parse(localStorage.getItem('gy_gc') || '{}')); } catch(e) {}
function saveGeoCache() { try { localStorage.setItem('gy_gc', JSON.stringify(geoCache)); } catch(e) {} }

// ── DOM ──
const selProv     = document.getElementById('selProvincia');
const selBarrio   = document.getElementById('selBarrio');
const btnClear    = document.getElementById('btnClear');
const panelBody   = document.getElementById('panelBody');
const panelTitle  = document.getElementById('panelTitle');
const panelSub    = document.getElementById('panelSubtitle');
const panelSearch = document.getElementById('panelSearch');
const searchInput = document.getElementById('searchInput');
const loadingBar  = document.getElementById('loadingBar');
const gsInput     = document.getElementById('gsInput');
const gsDropdown  = document.getElementById('gsDropdown');
const gsClear     = document.getElementById('gsClear');

const loading = on => loadingBar.classList.toggle('active', on);

// ── HELPERS ──
function daysAgo(d) { if (!d) return 999; return Math.floor((Date.now() - new Date(d)) / 86400000); }
function tagFromDays(d) {
  if (d <= 30) return '<span class="inmo-tag recent">Activa</span>';
  if (d <= 90) return '<span class="inmo-tag mid">Reciente</span>';
  return '<span class="inmo-tag old">Inactiva +90d</span>';
}
function dotClass(d) { return d <= 30 ? 'recent' : d <= 90 ? 'mid' : 'old'; }
function formatDate(s) { if (!s) return '—'; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; }
function formatAgo(days) {
  if (days === 0) return 'hoy';
  if (days === 1) return 'hace 1d';
  if (days < 30) return `hace ${days}d`;
  return `hace ${Math.floor(days/30)}m`;
}
function activityScore(inmos) {
  return inmos.reduce((s, i) => {
    const d = daysAgo(i.Fecha_Ultima_Venta);
    return s + (d <= 30 ? 3 : d <= 90 ? 1.5 : d <= 180 ? 0.5 : 0.1);
  }, 0);
}
function tempColor(score) {
  if (score >= 20) return '#e8385e';
  if (score >= 10) return '#f5a623';
  if (score >= 4)  return '#e8c97e';
  return '#4a90d9';
}

// ── ANIMATED COUNTER ──
function animateCounter(el, target, dur = 1200, delay = 0) {
  if (!el) return;
  setTimeout(() => {
    const t0 = performance.now();
    const tick = t => {
      const p = Math.min((t - t0) / dur, 1);
      const e = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(e * target).toLocaleString('es-AR');
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, delay);
}

// ── LOADER MESSAGES ──
const loaderMsgs = ['Conectando con los datos...','Preparando el mapa...','Cargando inmobiliarias...'];
let loaderIdx = 0;
const loaderEl = document.getElementById('loaderMsg');
const loaderInterval = setInterval(() => {
  loaderIdx = (loaderIdx + 1) % loaderMsgs.length;
  loaderEl.style.opacity = 0;
  setTimeout(() => { loaderEl.textContent = loaderMsgs[loaderIdx]; loaderEl.style.opacity = 1; }, 300);
}, 1800);

function hideLoader() {
  clearInterval(loaderInterval);
  document.getElementById('loadingOverlay').classList.add('hidden');
}

// ── GEOCODE ──
async function geocode(address) {
  const key = address.toLowerCase().trim();
  if (geoCache[key]) return geoCache[key];
  return new Promise((resolve, reject) => {
    new google.maps.Geocoder().geocode({ address, region: 'ar' }, (results, status) => {
      if (status === 'OK' && results[0]) {
        const loc = results[0].geometry.location;
        const coords = { lat: loc.lat(), lng: loc.lng() };
        geoCache[key] = coords;
        resolve(coords);
      } else reject(new Error(status));
    });
  });
}

// ── BACKGROUND GEOCODING (all zones) ──
async function geocodeAllZones() {
  const zones = [];
  for (const [, barrios] of locByProvincia) {
    for (const b of barrios) {
      if ((inmosByBarrio.get(b.nombre.toUpperCase()) || []).length > 0) zones.push(b);
    }
  }
  geoTotal = zones.filter(b => !geoCache[`${b.nombre}, ${b.provincia}, buenos aires, argentina`]).length;
  geoDone  = 0;
  updateGeoProgress();

  for (const b of zones) {
    try {
      await geocode(`${b.nombre}, ${b.provincia}, Buenos Aires, Argentina`);
      geoDone++;
      updateGeoProgress();
      saveGeoCache();
    } catch(e) {}
    await new Promise(r => setTimeout(r, 120));
  }

  // Unlock heatmap/temp buttons once geocoding is mostly done
  document.getElementById('btnHeat').disabled = false;
  document.getElementById('btnTemp').disabled = false;
  updateGeoProgress();
}

function updateGeoProgress() {
  const el = document.getElementById('geoProgressWrap');
  if (!el) return;
  if (geoTotal === 0 || geoDone >= geoTotal) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  const pct = Math.round(geoDone / geoTotal * 100);
  el.querySelector('.geo-progress-bar').style.width = pct + '%';
  el.querySelector('.geo-progress-text').textContent = `Cargando mapa de calor (${pct}%)`;
}

// ── DATA LOAD ──
async function loadData() {
  loading(true);
  try {
    const res = await fetch(N8N_ENDPOINT);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    raw = await res.json();

    for (const l of raw.localidades) {
      const prov = (l.provincia || '').toUpperCase().trim();
      const nom  = (l.nombre   || '').toUpperCase().trim();
      if (!prov || !nom) continue;
      if (!locByProvincia.has(prov)) locByProvincia.set(prov, []);
      locByProvincia.get(prov).push(l);
    }
    for (const i of raw.inmobiliarias) {
      const city = (i.Billing_City || '').toUpperCase().trim();
      if (!city) continue;
      if (!inmosByBarrio.has(city)) inmosByBarrio.set(city, []);
      inmosByBarrio.get(city).push(i);
    }

    const provs = [...locByProvincia.keys()].sort();
    for (const p of provs) {
      const o = document.createElement('option');
      o.value = p; o.textContent = p;
      selProv.appendChild(o);
    }

    animateCounter(document.getElementById('total-inmos'), raw.inmobiliarias.length, 1400, 200);
    animateCounter(document.getElementById('total-zonas'), provs.length, 1000, 400);

    renderWelcomePanel();
    hideLoader();

    // Auto-select CABA
    const cabaKey = [...locByProvincia.keys()].find(k => k.includes('AUTÓNOMA') || k.includes('AUTONOMA') || k === 'CABA');
    if (cabaKey) setTimeout(() => quickSelect(cabaKey), 400);

    // If geocache is mostly full, unlock heat/temp immediately
    const totalZones = [...locByProvincia.values()].flat()
      .filter(b => (inmosByBarrio.get(b.nombre.toUpperCase()) || []).length > 0).length;
    const cached = [...locByProvincia.values()].flat()
      .filter(b => geoCache[`${b.nombre}, ${b.provincia}, buenos aires, argentina`]).length;
    if (cached / totalZones > 0.7) {
      document.getElementById('btnHeat').disabled = false;
      document.getElementById('btnTemp').disabled = false;
    }

    // Start background geocoding
    geocodeAllZones();

  } catch (e) {
    console.error(e);
    hideLoader();
    panelTitle.textContent = 'Error';
    panelBody.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">No se pudieron cargar los datos</div><div class="empty-desc">${e.message}</div></div>`;
  }
  loading(false);
}

// ── WELCOME PANEL ──
function renderWelcomePanel() {
  const totalInmos = raw.inmobiliarias.length;
  const activas30  = raw.inmobiliarias.filter(i => daysAgo(i.Fecha_Ultima_Venta) <= 30).length;
  const totalZonas = locByProvincia.size;

  const partidoCount = new Map();
  for (const [prov, barrios] of locByProvincia) {
    let c = 0;
    for (const b of barrios) c += (inmosByBarrio.get(b.nombre.toUpperCase()) || []).length;
    if (c > 0) partidoCount.set(prov, c);
  }
  const top = [...partidoCount.entries()].sort((a,b) => b[1]-a[1]).slice(0, 5);
  const maxC = top[0]?.[1] || 1;

  const recent = [...raw.inmobiliarias]
    .filter(i => i.Fecha_Ultima_Venta)
    .sort((a,b) => new Date(b.Fecha_Ultima_Venta) - new Date(a.Fecha_Ultima_Venta))
    .slice(0, 6);

  panelTitle.textContent = 'Panorama general';
  panelSub.textContent   = 'Explorá el mapa o usá los accesos rápidos';
  panelSearch.style.display = 'none';

  panelBody.innerHTML = `
    <div class="fade-in">
      <div class="live-badge"><span class="live-dot"></span>En vivo · Actualizado hoy</div>

      <div class="welcome-stats-grid">
        <div class="ws-card"><div class="ws-val" id="wc-inmos">0</div><div class="ws-label">Inmobiliarias</div></div>
        <div class="ws-card"><div class="ws-val" id="wc-activas">0</div><div class="ws-label">Activas 30d</div></div>
        <div class="ws-card"><div class="ws-val" id="wc-zonas">0</div><div class="ws-label">Partidos</div></div>
      </div>

      <div id="geoProgressWrap" class="geo-progress" style="display:none">
        <div class="geo-progress-bar-wrap"><div class="geo-progress-bar" style="width:0%"></div></div>
        <span class="geo-progress-text" style="white-space:nowrap;font-size:10px">Preparando mapa de calor...</span>
      </div>

      <div class="section-title">Acceso rápido</div>
      <div class="quick-chips">
        ${top.map(([prov], i) => `
          <button class="chip${i === 0 ? ' featured' : ''}" onclick="quickSelect('${esc(prov)}')">
            ${i === 0 ? '★ ' : ''}${prov}
          </button>`).join('')}
      </div>

      <div class="section-title">Top partidos</div>
      <div class="top-zonas-list">
        ${top.map(([prov, count], i) => `
          <div class="top-zona-item" onclick="quickSelect('${esc(prov)}')">
            <div class="tz-rank">${i+1}</div>
            <div class="tz-name">${prov}</div>
            <div class="tz-bar-wrap"><div class="tz-bar" id="tzb${i}"></div></div>
            <div class="tz-count">${count}</div>
          </div>`).join('')}
      </div>

      <div class="section-title">Actividad reciente</div>
      <div class="activity-list">
        ${recent.map(i => {
          const d = daysAgo(i.Fecha_Ultima_Venta);
          return `<div class="activity-item">
            <div class="ai-left">
              <div class="ai-name"><div class="ai-dot ${dotClass(d)}"></div>${i.Account_Name}</div>
              <div class="ai-city">${i.Billing_City || '—'}</div>
            </div>
            <div class="ai-days">${formatAgo(d)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  animateCounter(document.getElementById('wc-inmos'),   totalInmos, 1200, 100);
  animateCounter(document.getElementById('wc-activas'), activas30,  1000, 250);
  animateCounter(document.getElementById('wc-zonas'),   totalZonas,  800, 400);
  top.forEach(([,count], i) => {
    setTimeout(() => {
      const b = document.getElementById(`tzb${i}`);
      if (b) b.style.width = Math.round(count / maxC * 100) + '%';
    }, 600 + i * 80);
  });
}

function esc(s) { return s.replace(/'/g, "\\'"); }

// ── GLOBAL SEARCH ──
gsInput.addEventListener('input', () => {
  const q = gsInput.value.trim();
  gsClear.style.display = q ? 'block' : 'none';
  if (!q || !raw) { gsDropdown.classList.remove('open'); return; }

  const lq = q.toLowerCase();
  const hits = raw.inmobiliarias
    .filter(i => i.Account_Name.toLowerCase().includes(lq))
    .slice(0, 12);

  if (!hits.length) {
    gsDropdown.innerHTML = `<div class="gs-empty">Sin resultados para "${q}"</div>`;
  } else {
    gsDropdown.innerHTML = hits.map(i => {
      const d = daysAgo(i.Fecha_Ultima_Venta);
      const tagClass = d <= 30 ? 'recent' : d <= 90 ? 'mid' : 'old';
      const tagText  = d <= 30 ? 'Activa' : d <= 90 ? 'Reciente' : 'Inactiva';
      return `<div class="gs-result" onclick="navigateToInmo('${esc(i.id || '')}', '${esc(i.Billing_City || '')}')">
        <span class="gs-result-icon">🏠</span>
        <div class="gs-result-info">
          <div class="gs-result-name">${i.Account_Name}</div>
          <div class="gs-result-meta">${i.Billing_City || '—'}${i.Comercial_GarantiaYa ? ' · ' + i.Comercial_GarantiaYa : ''}</div>
        </div>
        <span class="inmo-tag ${tagClass} gs-result-tag">${tagText}</span>
      </div>`;
    }).join('');
  }
  gsDropdown.classList.add('open');
});

gsInput.addEventListener('blur', () => setTimeout(() => gsDropdown.classList.remove('open'), 150));
gsInput.addEventListener('keydown', e => { if (e.key === 'Escape') clearGlobalSearch(); });

function clearGlobalSearch() {
  gsInput.value = '';
  gsClear.style.display = 'none';
  gsDropdown.classList.remove('open');
}

window.navigateToInmo = async function(id, city) {
  clearGlobalSearch();
  if (!city) return;
  const cityUp = city.toUpperCase().trim();

  // Find which partido this city belongs to
  let foundProv = null, foundLoca = null;
  for (const [prov, barrios] of locByProvincia) {
    const loca = barrios.find(b => b.nombre.toUpperCase() === cityUp);
    if (loca) { foundProv = prov; foundLoca = loca; break; }
  }
  if (!foundProv) return;

  // Select partido
  selProv.value = foundProv;
  selProv.dispatchEvent(new Event('change'));

  // Wait for markers then select localidad
  setTimeout(async () => {
    selBarrio.value = cityUp;
    selBarrio.dispatchEvent(new Event('change'));

    // Pan to it
    try {
      const coords = await geocode(`${foundLoca.nombre}, ${foundLoca.provincia}, Buenos Aires, Argentina`);
      map.panTo(new google.maps.LatLng(coords.lat, coords.lng));
      map.setZoom(15);
    } catch(e) {}
  }, 600);
};

// ── QUICK SELECT ──
window.quickSelect = function(prov) {
  selProv.value = prov;
  selProv.dispatchEvent(new Event('change'));
};

// ── CLEAR MARKERS ──
function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (infoWindow) infoWindow.close();
  if (heatmapLayer) { heatmapLayer.setMap(null); heatmapLayer = null; }
}

// ── HEATMAP ──
function buildHeatmap() {
  if (heatmapLayer) { heatmapLayer.setMap(null); heatmapLayer = null; }
  const pts = [];
  for (const [, barrios] of locByProvincia) {
    for (const b of barrios) {
      const inmos = inmosByBarrio.get(b.nombre.toUpperCase()) || [];
      if (!inmos.length) continue;
      const key = `${b.nombre}, ${b.provincia}, buenos aires, argentina`;
      if (!geoCache[key]) continue;
      const score = Math.max(1, activityScore(inmos));
      pts.push({ location: new google.maps.LatLng(geoCache[key].lat, geoCache[key].lng), weight: score });
    }
  }
  heatmapLayer = new google.maps.visualization.HeatmapLayer({
    data: pts, radius: 35, opacity: 0.85,
    gradient: ['rgba(0,0,0,0)','rgba(30,80,200,.6)','rgba(0,200,200,.8)','rgba(0,220,100,1)','rgba(255,200,0,1)','rgba(255,100,0,1)','rgba(220,30,60,1)'],
  });
  heatmapLayer.setMap(map);
}

// ── TEMPERATURE MODE ──
function buildTempMarkers() {
  clearMarkers();
  for (const [, barrios] of locByProvincia) {
    for (const b of barrios) {
      const inmos = inmosByBarrio.get(b.nombre.toUpperCase()) || [];
      if (!inmos.length) continue;
      const key = `${b.nombre}, ${b.provincia}, buenos aires, argentina`;
      if (!geoCache[key]) continue;
      const score = activityScore(inmos);
      const color = tempColor(score);
      const latLng = new google.maps.LatLng(geoCache[key].lat, geoCache[key].lng);
      const marker = new google.maps.Marker({
        position: latLng, map,
        title: b.nombre,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 7 + Math.min(inmos.length * .4, 9),
          fillColor: color, fillOpacity: .85,
          strokeColor: '#ffffff', strokeWeight: 1.5,
        }
      });
      marker._loca = b;
      marker.addListener('click', () => onMarkerClick(b, inmos, marker));
      markers.push(marker);
    }
  }
}

function onMarkerClick(b, inmos, marker) {
  if (infoWindow) infoWindow.close();
  const last = inmos.map(i => i.Fecha_Ultima_Venta).filter(Boolean).sort().reverse()[0];
  infoWindow = new google.maps.InfoWindow({
    content: `<div class="info-popup">
      <h3>${b.nombre}</h3>
      <div class="info-meta">${b.provincia}</div>
      <div class="info-badge">🏠 ${inmos.length} inmobiliaria${inmos.length !== 1 ? 's' : ''}</div>
      ${last ? `<div style="font-size:11px;color:#8888a0">Última venta: ${formatDate(last)}</div>` : ''}
    </div>`
  });
  infoWindow.open(map, marker);
  renderPanel(b.nombre, b);
  selBarrio.value = b.nombre.toUpperCase();
}

// ── SET MODE ──
function setMode(mode) {
  currentMode = mode;
  ['markers','heat','temp'].forEach(m => {
    document.getElementById(`btn${m.charAt(0).toUpperCase()+m.slice(1)}`).classList.toggle('active', m === mode);
  });
  if (heatmapLayer) { heatmapLayer.setMap(null); heatmapLayer = null; }
  markers.forEach(m => m.setMap(null)); markers = [];

  if (mode === 'heat') {
    buildHeatmap();
  } else if (mode === 'temp') {
    buildTempMarkers();
  }
  // markers mode: re-render current selection
  if (mode === 'markers' && selProv.value) {
    const ev = new Event('change');
    selProv.dispatchEvent(ev);
  }
}

// ── RENDER PANEL ──
function renderPanel(barrio, loca) {
  const list = inmosByBarrio.get(barrio.toUpperCase()) || [];
  currentInmos = list;
  panelTitle.textContent = loca.nombre;
  panelSub.textContent   = `${loca.provincia} · ${list.length} inmobiliaria${list.length !== 1 ? 's' : ''}`;
  panelSearch.style.display = list.length > 5 ? 'block' : 'none';
  searchInput.value = '';
  renderCards(list);
}

function renderCards(list) {
  if (!list.length) {
    panelBody.innerHTML = `<div class="empty-state fade-in">
      <div class="empty-icon">🏠</div>
      <div class="empty-title">Sin inmobiliarias registradas</div>
      <div class="empty-desc">No hay datos para esta localidad</div>
    </div>`;
    return;
  }
  const activas     = list.filter(i => daysAgo(i.Fecha_Ultima_Venta) <= 30).length;
  const comerciales = [...new Set(list.map(i => i.Comercial_GarantiaYa).filter(Boolean))].length;
  let html = `<div class="fade-in"><div class="zona-summary">
    <div class="zona-name">${list.length} inmobiliarias</div>
    <div class="zona-stats">
      <div class="zona-stat"><div class="zona-stat-val">${activas}</div><div class="zona-stat-label">Activas (30d)</div></div>
      <div class="zona-stat"><div class="zona-stat-val">${comerciales}</div><div class="zona-stat-label">Comerciales</div></div>
    </div>
  </div>`;
  for (const i of list) {
    const d = daysAgo(i.Fecha_Ultima_Venta);
    const web = i.Website ? `<a href="${i.Website.startsWith('http') ? i.Website : 'https://'+i.Website}" target="_blank">🌐 Web</a>` : '';
    html += `<div class="inmo-card" onclick="focusInmo('${esc(i.id || '')}')">
      <div class="inmo-name">${i.Account_Name}</div>
      ${i.Comercial_GarantiaYa ? `<div class="inmo-row">👤 <span class="val">${i.Comercial_GarantiaYa}</span></div>` : ''}
      ${i.Billing_Street       ? `<div class="inmo-row">📍 <span class="val">${i.Billing_Street}</span></div>` : ''}
      ${tagFromDays(d)}
      <div class="inmo-footer">
        <div style="display:flex;gap:10px;align-items:center">
          <a href="${i.url}" target="_blank">Ver CRM →</a>${web}
        </div>
        <div class="date-badge">Última venta: ${formatDate(i.Fecha_Ultima_Venta)}</div>
      </div>
    </div>`;
  }
  html += '</div>';
  panelBody.innerHTML = html;
}

window.focusInmo = function(id) {
  const m = markers.find(m => m._inmoId === id);
  if (m) { map.panTo(m.getPosition()); map.setZoom(16); google.maps.event.trigger(m, 'click'); }
};

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { renderCards(currentInmos); return; }
  renderCards(currentInmos.filter(i =>
    i.Account_Name.toLowerCase().includes(q) ||
    (i.Comercial_GarantiaYa || '').toLowerCase().includes(q) ||
    (i.Billing_Street || '').toLowerCase().includes(q)
  ));
});

// ── PARTIDO CHANGE ──
selProv.addEventListener('change', async () => {
  selBarrio.innerHTML = '<option value="">Seleccioná una localidad</option>';
  selBarrio.disabled  = true;
  if (currentMode !== 'heat' && currentMode !== 'temp') {
    markers.forEach(m => m.setMap(null)); markers = [];
  }
  if (infoWindow) infoWindow.close();
  panelSearch.style.display = 'none';

  if (!selProv.value) {
    if (raw) renderWelcomePanel();
    if (currentMode === 'heat') buildHeatmap();
    if (currentMode === 'temp') buildTempMarkers();
    return;
  }

  panelTitle.textContent = selProv.value;
  panelSub.textContent   = 'Cargando...';
  panelBody.innerHTML    = `<div class="empty-state"><div class="empty-icon">📍</div><div class="empty-title">Elegí una localidad</div></div>`;

  const barrios = locByProvincia.get(selProv.value) || [];
  for (const b of barrios) {
    const o = document.createElement('option');
    o.value = b.nombre.toUpperCase(); o.textContent = b.nombre;
    selBarrio.appendChild(o);
  }
  selBarrio.disabled = false;
  panelSub.textContent = `${barrios.length} localidades`;

  if (currentMode === 'heat' || currentMode === 'temp') return;

  loading(true);
  const bounds = new google.maps.LatLngBounds();
  for (const b of barrios) {
    try {
      const coords = await geocode(`${b.nombre}, ${b.provincia}, Buenos Aires, Argentina`);
      const inmos  = inmosByBarrio.get(b.nombre.toUpperCase()) || [];
      if (!inmos.length) continue;
      const latLng = new google.maps.LatLng(coords.lat, coords.lng);
      const marker = new google.maps.Marker({
        position: latLng, map, title: b.nombre,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 7 + Math.min(inmos.length * .5, 8),
          fillColor: inmos.length >= 10 ? '#5b6af7' : inmos.length >= 5 ? '#7c8bf9' : '#e8c97e',
          fillOpacity: .9, strokeColor: '#fff', strokeWeight: 1.5,
        }
      });
      marker._loca = b;
      marker.addListener('click', () => { onMarkerClick(b, inmos, marker); selBarrio.value = b.nombre.toUpperCase(); });
      markers.push(marker);
      bounds.extend(latLng);
    } catch(e) {}
  }
  if (markers.length) { map.fitBounds(bounds, { top:60, right:60, bottom:60, left:60 }); if (map.getZoom() > 14) map.setZoom(14); }
  loading(false);
});

// ── LOCALIDAD CHANGE ──
selBarrio.addEventListener('change', async () => {
  if (!selBarrio.value) return;
  const loca = (locByProvincia.get(selProv.value) || []).find(b => b.nombre.toUpperCase() === selBarrio.value);
  if (!loca) return;
  renderPanel(selBarrio.value, loca);
  try {
    const coords = await geocode(`${loca.nombre}, ${loca.provincia}, Buenos Aires, Argentina`);
    map.panTo(new google.maps.LatLng(coords.lat, coords.lng));
    map.setZoom(14);
  } catch(e) {}
});

// ── CLEAR ──
btnClear.addEventListener('click', () => {
  selProv.value = '';
  selBarrio.innerHTML = '<option value="">Seleccioná una localidad</option>';
  selBarrio.disabled = true;
  clearMarkers();
  panelSearch.style.display = 'none';
  if (raw) renderWelcomePanel();
  map.setCenter({ lat: -34.62, lng: -58.65 });
  map.setZoom(10);
});

// ── MAP INIT ──
window.initMap = async function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: -34.62, lng: -58.65 }, zoom: 10,
    styles: [
      { elementType: 'geometry',         stylers: [{ color: '#1a1a24' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#8888a0' }] },
      { elementType: 'labels.text.stroke',stylers:[{ color: '#13131a' }] },
      { featureType: 'administrative',   elementType: 'geometry.stroke', stylers: [{ color: '#2d2d42' }] },
      { featureType: 'administrative.land_parcel', elementType: 'labels', stylers: [{ visibility: 'off' }] },
      { featureType: 'poi',    stylers: [{ visibility: 'off' }] },
      { featureType: 'road',   elementType: 'geometry', stylers: [{ color: '#24243a' }] },
      { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#2a2a40' }] },
      { featureType: 'road.highway',  elementType: 'geometry', stylers: [{ color: '#30304a' }] },
      { featureType: 'road.highway',  elementType: 'labels',   stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
      { featureType: 'water',   elementType: 'geometry', stylers: [{ color: '#0a0a14' }] },
      { featureType: 'water',   elementType: 'labels.text.fill', stylers: [{ color: '#3d3d58' }] },
    ],
    disableDefaultUI: false, zoomControl: true,
    mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
  });
  await loadData();
};
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD3TyurpPf8hTBVBNpDwGNDyjZHPIzIHY8&libraries=visualization&callback=initMap&loading=async"></script>
